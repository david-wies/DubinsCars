name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Cancel superseded runs on the same ref (e.g. new push to a PR).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege default; jobs below don't need any write scope.
permissions:
  contents: read

jobs:
  lint:
    name: lint (pre-commit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.10"
      # Runs the exact same hooks as `pre-commit run --all-files` locally
      # (see .pre-commit-config.yaml) — local and CI never drift apart.
      - uses: pre-commit/action@2c7b3805fd2a0fd8c1884dcaebf91fc102a13ecd # v3.0.1

  test:
    name: pytest (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install package + dev dependencies
        run: pip install -e ".[dev]"
      # Only the pure math-core suite (dubins_demo/tests). The Tkinter UI is
      # explicitly not auto-tested per spec T-5 — see the manual checklist in
      # docs/design/2026-07-17-dubins-demo-design.md, section 7.2.
      - name: Run pytest
        run: pytest
