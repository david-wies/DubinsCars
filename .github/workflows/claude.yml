name: Claude Code

# @claude mention bot. Responds when someone writes "@claude" in an issue,
# a PR/issue comment, or a review. Distinct from claude-review.yml, which
# auto-reviews every PR without being asked.
#
# No `concurrency` block on purpose (unlike claude-review.yml): each @claude
# mention is an independent request, so cancel-in-progress would kill an
# in-flight reply when a second mention lands. Let them run in parallel.
on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    # Only run when the trigger text actually contains @claude.
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    # contents/pull-requests/issues: read to inspect the repo and thread;
    # id-token: write for the action's OIDC handshake;
    # actions: read so Claude can read CI results on PRs.
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          # This job only reads code; the action posts via its own app token.
          # Don't leave the checkout token in .git/config for later steps.
          persist-credentials: false

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@3553f84341b92da26052e28acf1aa898f9511f32 # v1
        with:
          # Subscription (Pro/Max) auth — no extra API billing. Generated by
          # running `/install-github-app` in Claude Code. To bill an Anthropic
          # API key instead, swap this for:
          #   anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Let Claude read CI results on PRs.
          additional_permissions: |
            actions: read
