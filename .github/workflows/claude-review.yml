name: Claude Review

on:
  pull_request:
    types: [opened, synchronize]
    branches: [main]

# Cancel superseded reviews on the same ref (e.g. new push to a PR).
concurrency:
  group: claude-review-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# contents: read to check out; pull-requests: write to post review comments;
# id-token: write for the action's OIDC handshake.
permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  review:
    name: claude review
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          # This job only reads code; the review action posts via its own token.
          # Don't leave the checkout token in .git/config for later steps.
          persist-credentials: false
      - uses: anthropics/claude-code-action@3553f84341b92da26052e28acf1aa898f9511f32 # v1
        with:
          # Subscription (Pro/Max) auth — no extra API billing. Generated by
          # running `/install-github-app` in Claude Code. To bill an Anthropic
          # API key instead, swap this for:
          #   anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Review this pull request. This is a Python + Tkinter + matplotlib +
            numpy desktop app that computes Dubins paths; see CLAUDE.md for the
            strict core/ui/persistence layering and domain invariants (canonical
            units are meters + radians in the math convention).

            Focus on correctness bugs, broken invariants (unit/convention/layer
            leaks), and clear simplifications. Skip style nits already covered by
            ruff/pre-commit. Post findings as inline PR comments, most-severe
            first, and keep them high-signal — no praise, no filler.
          claude_args: >-
            --allowed-tools
            "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*)"
